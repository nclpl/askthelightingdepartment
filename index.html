<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask The Lighting Department</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            background: white;
        }
        #question {
            font-size: 3rem;
            font-weight: 900;
            color: black;
            margin: 0.2em 0;
            text-align: center;
            padding: 0 1rem;
            min-height: 2em;
        }
        #question::after {
            content: '';
            display: inline-block;
            width: 2px;
            height: 1em;
            background: black;
            vertical-align: middle;
            margin-left: 2px;
            animation: blink 0.7s step-end infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        #answer {
            font-size: 3rem;
            font-weight: 900;
            color: black;
            margin: 1.2em 0 0.2em 0;
            text-align: center;
            padding: 0 1rem;
        }
        #subtext {
            font-size: 1.2rem;
            font-weight: 400;
            color: #555;
            margin: 0.5em 0 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <p id="question"></p>
    <p id="answer">Have you asked the lighting department?</p>
    <p id="subtext">(We'd be happy to help)</p>
    <script>
        let questions = [];

        fetch('questions.json')
            .then(r => r.json())
            .then(data => {
                questions = data;
                cycle();
            });

        const el = document.getElementById('question');
        const TYPE_SPEED = 40;
        const DELETE_SPEED = 20;
        const PAUSE_AFTER_TYPE = 2000;
        const PAUSE_AFTER_DELETE = 500;

        let questionIndex = 0;

        function typeText(text, callback) {
            let i = 0;
            function step() {
                if (i <= text.length) {
                    el.textContent = text.slice(0, i);
                    i++;
                    setTimeout(step, TYPE_SPEED);
                } else {
                    callback();
                }
            }
            step();
        }

        function deleteText(callback) {
            const text = el.textContent;
            let i = text.length;
            function step() {
                if (i >= 0) {
                    el.textContent = text.slice(0, i);
                    i--;
                    setTimeout(step, DELETE_SPEED);
                } else {
                    callback();
                }
            }
            step();
        }

        function cycle() {
            typeText(questions[questionIndex], () => {
                setTimeout(() => {
                    deleteText(() => {
                        questionIndex = (questionIndex + 1) % questions.length;
                        setTimeout(cycle, PAUSE_AFTER_DELETE);
                    });
                }, PAUSE_AFTER_TYPE);
            });
        }
    </script>
</body>
</html>
